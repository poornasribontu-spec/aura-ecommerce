<!DOCTYPE html>
<html>

<head>

  <title>Aura Wishlist</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- NAVBAR -->

  <div class="navbar">

    <h1>
      ❤️ My Wishlist
    </h1>

    <a href="/">

      <button class="cart-btn">
        Back To Shop
      </button>

    </a>

  </div>

  <!-- WISHLIST -->

  <div id="wishlistContainer"></div>

  <!-- EMPTY WISHLIST -->

  <div
    id="emptyWishlist"
    style="display:none;"
  >

    <h1>
      💔 Wishlist Is Empty
    </h1>

    <p>
      Save products you love here.
    </p>

  </div>

  <!-- TOAST -->

  <div id="toast"></div>

  <script>

    // =========================
    // LOAD WISHLIST
    // =========================

    let wishlist =
      JSON.parse(

        localStorage.getItem(
          "wishlist"
        )

      ) || [];

    const container =
      document.getElementById(
        "wishlistContainer"
      );

    // =========================
    // DISPLAY WISHLIST
    // =========================

    function displayWishlist(){

      container.innerHTML = "";

      // EMPTY WISHLIST

      if(wishlist.length === 0){

        document.getElementById(
          "emptyWishlist"
        ).style.display = "block";

        return;

      }

      document.getElementById(
        "emptyWishlist"
      ).style.display = "none";

      // DISPLAY PRODUCTS

      wishlist.forEach((product, index) => {

        container.innerHTML += `

          <div class="product fade-in">

            <img
              src="${product.image}"
              alt="${product.name}"
            >

            <h2>
              ${product.name}
            </h2>

            <p>
              ₹${product.price}
            </p>

            <div class="product-buttons">

              <button
                onclick="addToCart(${index})"
              >
                Add To Cart
              </button>

              <button
                onclick="removeWishlist(${index})"
              >
                Remove
              </button>

            </div>

          </div>

        `;

      });

    }

    // =========================
    // REMOVE FROM WISHLIST
    // =========================

    function removeWishlist(index){

      wishlist.splice(index, 1);

      localStorage.setItem(

        "wishlist",

        JSON.stringify(wishlist)

      );

      showToast(
        "Removed From Wishlist"
      );

      displayWishlist();

    }

    // =========================
    // ADD TO CART
    // =========================

    function addToCart(index){

      let cart =
        JSON.parse(

          localStorage.getItem(
            "cart"
          )

        ) || [];

      const product =
        wishlist[index];

      const existing =
        cart.find(item =>

          item._id === product._id

        );

      if(existing){

        existing.quantity += 1;

      }

      else {

        cart.push({

          ...product,

          quantity: 1

        });

      }

      localStorage.setItem(

        "cart",

        JSON.stringify(cart)

      );

      showToast(
        "🛒 Added To Cart"
      );

    }

    // =========================
    // TOAST
    // =========================

    function showToast(message){

      const toast =
        document.getElementById(
          "toast"
        );

      toast.innerText = message;

      toast.classList.add(
        "show"
      );

      setTimeout(() => {

        toast.classList.remove(
          "show"
        );

      }, 2500);

    }

    // =========================
    // INITIAL LOAD
    // =========================

    displayWishlist();

  </script>

</body>

</html>
