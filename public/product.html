<!DOCTYPE html>
<html>

<head>

  <title>Aura Product Details</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- NAVBAR -->

  <div class="navbar">

    <h1>
      🛍 Aura
    </h1>

    <a href="/">

      <button class="cart-btn">
        Back To Shop
      </button>

    </a>

  </div>

  <!-- PRODUCT DETAILS -->

  <div id="productDetails">

    <h2 style="text-align:center;">
      Loading Product...
    </h2>

  </div>

  <script>

    // =========================
    // LOAD PRODUCT
    // =========================

    async function loadProduct(){

      try {

        const params =
          new URLSearchParams(
            window.location.search
          );

        const id =
          params.get("id");

        // INVALID ID

        if(!id){

          document.getElementById(
            "productDetails"
          ).innerHTML = `

            <h2 style="text-align:center;">

              Product Not Found

            </h2>

          `;

          return;

        }

        // FETCH PRODUCTS

        const res =
          await fetch("/products");

        const products =
          await res.json();

        const product =
          products.find(

            p => p._id === id

          );

        // PRODUCT NOT FOUND

        if(!product){

          document.getElementById(
            "productDetails"
          ).innerHTML = `

            <h2 style="text-align:center;">

              Product Not Found

            </h2>

          `;

          return;

        }

        // DISPLAY PRODUCT

        const container =
          document.getElementById(
            "productDetails"
          );

        container.innerHTML = `

          <div class="product fade-in">

            <img
              src="${product.image}"
              alt="${product.name}"
            >

            <h1>
              ${product.name}
            </h1>

            <h2>
              ₹${product.price}
            </h2>

            <p>
              ${product.description}
            </p>

            <p>

              <strong>
                Category:
              </strong>

              ${product.category}

            </p>

            <div class="product-buttons">

              <button
                onclick="addToCart('${product._id}')"
              >
                Add To Cart
              </button>

              <button
                onclick="addToWishlist('${product._id}')"
              >
                ❤️ Wishlist
              </button>

            </div>

          </div>

        `;

      } catch(error){

        console.log(error);

        document.getElementById(
          "productDetails"
        ).innerHTML = `

          <h2 style="text-align:center;">

            Failed To Load Product

          </h2>

        `;

      }

    }

    // =========================
    // ADD TO CART
    // =========================

    async function addToCart(id){

      const res =
        await fetch("/products");

      const products =
        await res.json();

      const product =
        products.find(

          p => p._id === id

        );

      let cart =
        JSON.parse(

          localStorage.getItem("cart")

        ) || [];

      const existingProduct =
        cart.find(

          item => item._id === id

        );

      if(existingProduct){

        existingProduct.quantity += 1;

      } else {

        product.quantity = 1;

        cart.push(product);

      }

      localStorage.setItem(

        "cart",

        JSON.stringify(cart)

      );

      alert(
        "🛒 Product Added To Cart"
      );

    }

    // =========================
    // ADD TO WISHLIST
    // =========================

    async function addToWishlist(id){

      const res =
        await fetch("/products");

      const products =
        await res.json();

      const product =
        products.find(

          p => p._id === id

        );

      let wishlist =
        JSON.parse(

          localStorage.getItem(
            "wishlist"
          )

        ) || [];

      const exists =
        wishlist.find(

          item => item._id === id

        );

      if(exists){

        alert(
          "Already In Wishlist"
        );

        return;

      }

      wishlist.push(product);

      localStorage.setItem(

        "wishlist",

        JSON.stringify(wishlist)

      );

      alert(
        "❤️ Added To Wishlist"
      );

    }

    // =========================
    // INITIAL LOAD
    // =========================

    loadProduct();

  </script>

</body>

</html>
