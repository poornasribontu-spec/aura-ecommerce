<!DOCTYPE html>
<html>

<head>

  <title>Aura Login</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="product login-container">

    <h1>
      🛍 Aura Login
    </h1>

    <p>
      Welcome back to Aura
    </p>

    <!-- EMAIL -->

    <input
      type="email"
      id="email"
      placeholder="Enter Email"
    >

    <br><br>

    <!-- PASSWORD -->

    <input
      type="password"
      id="password"
      placeholder="Enter Password"
    >

    <br><br>

    <!-- LOGIN BUTTON -->

    <button
      id="loginBtn"
      onclick="loginUser()"
    >
      Login
    </button>

    <br><br>

    <!-- REGISTER -->

    <p>

      Don't have an account?

      <a href="/register.html">
        Register
      </a>

    </p>

  </div>

  <script>

    // =========================
    // REDIRECT IF LOGGED IN
    // =========================

    if(
      localStorage.getItem(
        "loggedInUser"
      )
    ){

      window.location.href = "/";

    }

    // =========================
    // ENTER KEY LOGIN
    // =========================

    document.addEventListener(

      "keypress",

      function(event){

        if(event.key === "Enter"){

          loginUser();

        }

      }

    );

    // =========================
    // LOGIN USER
    // =========================

    async function loginUser(){

      try {

        const email =
          document.getElementById(
            "email"
          ).value.trim();

        const password =
          document.getElementById(
            "password"
          ).value.trim();

        // VALIDATION

        if(
          !email ||
          !password
        ){

          alert(
            "Please Fill All Fields"
          );

          return;

        }

        // BUTTON LOADING

        const loginBtn =
          document.getElementById(
            "loginBtn"
          );

        loginBtn.disabled = true;

        loginBtn.innerText =
          "Logging In...";

        // API CALL

        const res =
          await fetch("/login", {

            method: "POST",

            headers: {
              "Content-Type":
                "application/json"
            },

            body: JSON.stringify({
              email,
              password
            })

          });

        const data =
          await res.json();

        alert(data.message);

        // SUCCESS LOGIN

        if(
          data.message ===
          "Login Successful"
        ){

          localStorage.setItem(

            "loggedInUser",

            email

          );

          window.location.href =
            "/";

        }

        // RESET BUTTON

        loginBtn.disabled = false;

        loginBtn.innerText =
          "Login";

      } catch(error){

        console.log(error);

        alert(
          "Login Failed"
        );

      }

    }

  </script>

</body>

</html>
