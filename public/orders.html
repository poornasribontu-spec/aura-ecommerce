<!DOCTYPE html>
<html>

<head>

  <title>Aura Orders</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- NAVBAR -->

  <div class="navbar">

    <h1>
      My Orders
    </h1>

    <a href="/">

      <button class="cart-btn">
        Back To Shop
      </button>

    </a>

  </div>

  <!-- ORDERS -->

  <div id="ordersContainer"></div>

  <!-- EMPTY ORDERS -->

  <div
    id="emptyOrders"
    style="display:none;"
  >

    <h1>
      📦 No Orders Yet
    </h1>

    <p>
      Start shopping to place your first order.
    </p>

  </div>

  <script>

    // =========================
    // CHECK LOGIN
    // =========================

    const loggedInUser =
      localStorage.getItem(
        "loggedInUser"
      );

    if(!loggedInUser){

      alert(
        "Please Login First"
      );

      window.location.href =
        "/login.html";

    }

    // =========================
    // FETCH ORDERS
    // =========================

    async function fetchOrders(){

      try {

        const res =
          await fetch("/orders");

        const orders =
          await res.json();

        const myOrders =
          orders.filter(order =>

            order.user ===
            loggedInUser

          );

        const container =
          document.getElementById(
            "ordersContainer"
          );

        container.innerHTML = "";

        // EMPTY ORDERS

        if(myOrders.length === 0){

          document.getElementById(
            "emptyOrders"
          ).style.display = "block";

          return;

        }

        // DISPLAY ORDERS

        myOrders.forEach(order => {

          if(order.totalAmount <= 0)
            return;

          let productsHTML = "";

          order.products.forEach(product => {

            productsHTML += `

              <div class="order-product">

                <p>
                  ${product.name}
                </p>

                <p>
                  ₹${product.price}
                </p>

                <p>
                  Quantity:
                  ${product.quantity}
                </p>

              </div>

            `;

          });

          container.innerHTML += `

            <div class="product">

              <h2>
                📦 Order
              </h2>

              ${productsHTML}

              <p>

                <strong>
                  Payment:
                </strong>

                ${order.paymentMethod}

              </p>

              <p>

                <strong>
                  Address:
                </strong>

                ${order.address}

              </p>

              <p>

                <strong>
                  Phone:
                </strong>

                ${order.phone}

              </p>

              <h3>

                Total:
                ₹${order.totalAmount}

              </h3>

            </div>

          `;

        });

      } catch(error){

        console.log(error);

        alert(
          "Failed To Load Orders"
        );

      }

    }

    // =========================
    // INITIAL LOAD
    // =========================

    fetchOrders();

  </script>

</body>

</html>
