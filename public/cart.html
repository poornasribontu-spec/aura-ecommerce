<!DOCTYPE html>
<html>

<head>

  <title>Aura Cart</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="navbar">

    <h1>Your Cart</h1>

    <a href="/">

      <button class="cart-btn">
        Back To Shop
      </button>

    </a>

  </div>

  <!-- PRODUCTS -->

  <div id="cartItems"></div>

  <!-- EMPTY CART -->

  <div id="emptyCart" style="display:none;">

    <h1>
      🛒 Your Cart Is Empty
    </h1>

    <p>
      Add products to continue shopping
    </p>

    <a href="/">

      <button class="cart-btn">
        Continue Shopping
      </button>

    </a>

  </div>

  <!-- TOTAL -->

  <h2 id="total"></h2>

  <!-- CHECKOUT BUTTON -->

  <div
    class="cart-page-btn"
    id="checkoutContainer"
  >

    <button
      class="cart-btn"
      onclick="checkout()"
    >
      Checkout
    </button>

  </div>

  <script>

    let cart =
      JSON.parse(
        localStorage.getItem("cart")
      ) || [];

    let container =
      document.getElementById(
        "cartItems"
      );

    let total = 0;

    // =========================
    // SAVE CART
    // =========================

    function saveCart(){

      localStorage.setItem(
        "cart",
        JSON.stringify(cart)
      );

    }

    // =========================
    // DISPLAY CART
    // =========================

    function displayCart(){

      container.innerHTML = "";

      total = 0;

      document.getElementById(
        "emptyCart"
      ).style.display = "none";

      document.getElementById(
        "checkoutContainer"
      ).style.display = "block";

      if(cart.length === 0){

        document.getElementById(
          "emptyCart"
        ).style.display = "block";

        document.getElementById(
          "total"
        ).innerText = "";

        document.getElementById(
          "checkoutContainer"
        ).style.display = "none";

        return;

      }

      cart.forEach((product, index) => {

        total +=
          product.price * product.quantity;

        container.innerHTML += `

          <div class="cart-product">

            <img
              src="${product.image}"
              alt="${product.name}"
            >

            <h2>
              ${product.name}
            </h2>

            <p>
              ₹${product.price}
            </p>

            <p>
              ₹${product.price}
              ×
              ${product.quantity}
            </p>

            <div class="qty-controls">

              <button
                onclick="decreaseQty(${index})"
              >
                -
              </button>

              <span>
                ${product.quantity}
              </span>

              <button
                onclick="increaseQty(${index})"
              >
                +
              </button>

            </div>

            <button
              onclick="removeItem(${index})"
            >
              Remove
            </button>

          </div>

        `;

      });

      document.getElementById(
        "total"
      ).innerText =
        "Total: ₹" + total;

    }

    // =========================
    // REMOVE ITEM
    // =========================

    function removeItem(index){

      cart.splice(index, 1);

      saveCart();

      displayCart();

    }

    // =========================
    // INCREASE QUANTITY
    // =========================

    function increaseQty(index){

      cart[index].quantity += 1;

      saveCart();

      displayCart();

    }

    // =========================
    // DECREASE QUANTITY
    // =========================

    function decreaseQty(index){

      if(cart[index].quantity > 1){

        cart[index].quantity -= 1;

      } else {

        cart.splice(index, 1);

      }

      saveCart();

      displayCart();

    }

    // =========================
    // CHECKOUT
    // =========================

    function checkout(){

      if(cart.length === 0){

        alert("Cart Is Empty");

        return;

      }

      window.location.href =
        "/checkout.html";

    }

    // =========================
    // INITIAL LOAD
    // =========================

    displayCart();

  </script>

</body>

</html>
